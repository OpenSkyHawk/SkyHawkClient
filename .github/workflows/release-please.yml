name: Release

# Every push to main only updates a release PR (a live preview of the next
# version + changelog computed from conventional commits — it releases nothing).
# Merging that PR is the manual "cut a release" request: release-please tags +
# creates the GitHub Release, then the build job attaches the Win/Mac artifacts.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build & attach (${{ matrix.os }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build & package (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win -- --publish never
      - name: Build & package (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac -- --publish never
      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage

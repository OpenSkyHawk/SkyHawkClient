name: Release

# Fires on push to main ONLY when a release PR is merged (commit message starts
# with "chore(main): release"). Normal commits are ignored.
# Dispatch with rebuild_tag to re-attach artifacts to an existing release.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_tag:
        description: 'Tag name to rebuild & re-attach artifacts (e.g. openskyhawk-client-v1.0.0). Leave blank for normal release-please run.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    if: "startsWith(github.event.head_commit.message, 'chore(main): release') || github.event_name == 'workflow_dispatch'"
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build & attach (${{ matrix.os }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || inputs.rebuild_tag != ''
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Build & package (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win -- --publish never
      - name: Build & package (macOS)
        if: runner.os == 'macOS'
        run: npm run build:mac -- --publish never
      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || inputs.rebuild_tag }}
          fail_on_unmatched_files: false
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
            release/*.AppImage
